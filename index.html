<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeVault v15.7 - Complete Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        #bg-container { position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; opacity: 0.8; filter: brightness(0.7); transition: 0.8s; }
        .glass { background: rgba(15, 15, 20, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; backdrop-filter: blur(25px); }
        .card-box { background: rgba(30, 30, 35, 0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; }
        .card-box:hover { border-color: var(--theme-color); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(188, 66, 245, 0.2); }
        .qty-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.9); border: 1px solid var(--theme-color); padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; z-index: 10; }
        .nav-btn.active { border-bottom: 4px solid var(--theme-color); opacity: 1; }
        .sidebar { width: 280px; transition: 0.3s; }
        .folder-btn { width: 100%; text-align: left; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .folder-btn.active { border-color: var(--theme-color); background: rgba(188, 66, 245, 0.1); color: var(--theme-color); }
        .folder-btn.drag-over { border-color: var(--theme-color); transform: scale(1.02); background: rgba(188, 66, 245, 0.2); }
        :root { --theme-color: #bc42f5; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="bg-container"></div>
    <div class="max-w-[1650px] mx-auto flex flex-col md:flex-row gap-8">
        
        <aside id="collectionSidebar" class="sidebar hidden">
            <div class="glass p-6 sticky top-8">
                <h2 class="text-[10px] font-black uppercase tracking-[0.2em] mb-6 opacity-40">My Vaults</h2>
                <div id="folderList" class="flex flex-col gap-3 mb-6 max-h-[60vh] overflow-y-auto"></div>
                <button onclick="addFolder()" class="w-full py-4 rounded-xl border border-dashed border-white/10 text-[10px] font-black uppercase hover:bg-white/5">+ New Vault</button>
                <button id="syncBtn" onclick="syncAllToSheets()" class="w-full mt-4 py-3 bg-green-600/20 text-green-400 border border-green-500/20 rounded-xl text-[9px] font-black uppercase hover:bg-green-600 hover:text-white">🔄 Sync to Sheets</button>
            </div>
        </aside>

        <main class="flex-1 min-w-0">
            <nav class="flex gap-10 mb-8 px-4">
                <button onclick="switchMode('db')" id="navDb" class="nav-btn pb-2 text-sm font-black uppercase opacity-40 active">🔍 Search</button>
                <button onclick="switchMode('col')" id="navCol" class="nav-btn pb-2 text-sm font-black uppercase opacity-40">🗄️ Collection</button>
            </nav>

            <header class="glass p-8 mb-10 border-white/10 relative">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h1 id="logo" class="text-4xl font-black italic tracking-tighter uppercase">PokeVault</h1>
                        <div class="flex gap-10 mt-6 text-sm">
                            <div class="flex flex-col"><span class="text-[9px] opacity-40 font-black uppercase mb-1">Global Paid</span><span id="totalPaid" class="font-bold text-2xl">€0.00</span></div>
                            <div class="flex flex-col"><span class="text-[9px] opacity-40 font-black uppercase mb-1 text-blue-400">Global Value</span><span id="totalVal" class="text-blue-400 font-bold text-2xl">€0.00</span></div>
                            <div class="flex flex-col"><span class="text-[9px] opacity-40 font-black uppercase mb-1">Total P/L</span><span id="netProfit" class="font-black text-2xl">€0.00</span></div>
                        </div>
                    </div>
                    <div class="flex gap-3 bg-black/40 p-2 rounded-full border border-white/5">
                        <button onclick="setTheme('gengar')" class="w-8 h-8 rounded-full bg-purple-700"></button>
                        <button onclick="setTheme('pikachu')" class="w-8 h-8 rounded-full bg-yellow-500"></button>
                    </div>
                </div>
                <div class="h-[120px] w-full"><canvas id="mainChart"></canvas></div>
            </header>

            <div id="databaseUI">
                <div class="glass p-5 mb-10 flex flex-wrap gap-4 items-center">
                    <input type="text" id="searchInput" onkeydown="if(event.key==='Enter') startSearch()" placeholder="Search Pokémon, Set or ID (e.g. SVP 159)..." class="flex-1 p-5 rounded-2xl font-bold bg-black/60 border border-white/10 outline-none focus:border-[#bc42f5] text-lg">
                    <select id="sortSelect" onchange="renderGrid()" class="bg-black/60 border border-white/10 p-5 rounded-2xl text-xs font-black uppercase outline-none">
                        <option value="number">Number</option>
                        <option value="price_desc">Price High</option>
                        <option value="price_asc">Price Low</option>
                    </select>
                    <button onclick="startSearch()" id="searchBtn" class="px-12 py-5 rounded-2xl font-black uppercase text-sm hover:brightness-110">Search API</button>
                    <button id="bulkAddBtn" onclick="bulkAddSet()" class="hidden bg-blue-600 px-8 py-5 rounded-2xl font-black uppercase text-xs">Add All</button>
                </div>
            </div>

            <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 mb-32"></div>
        </main>
    </div>

    <div id="cardModal" class="hidden fixed inset-0 bg-black/98 z-[500] flex items-center justify-center p-4 backdrop-blur-2xl">
        <div class="glass max-w-lg w-full p-10 relative border-white/20"><button onclick="closeModal()" class="absolute top-6 right-6 text-white/20 text-2xl font-black">✕</button><div id="modalContent"></div></div>
    </div>
    <div id="folderModal" class="hidden fixed inset-0 bg-black/98 z-[500] flex items-center justify-center p-4 backdrop-blur-2xl">
        <div class="glass max-w-2xl w-full p-10 relative border-white/20"><button onclick="closeFolderModal()" class="absolute top-6 right-6 text-white/20 text-2xl font-black">✕</button><div id="folderModalContent"></div></div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEXgzNPbTOtwKQtXznhlq-isS7lEt24sB-xatz3Z8nJyAUbxgMc9tf9-P4t9rL5St2/exec"; // Βάλε το Google Script URL σου
    let vaults = JSON.parse(localStorage.getItem('pv_v12_data')) || { 'Main Collection': [] };
    let folderOrder = JSON.parse(localStorage.getItem('pv_folder_order')) || Object.keys(vaults);
    let currentTheme = localStorage.getItem('pv_theme') || 'gengar';
    let currentFolder = folderOrder[0], currentMode = 'db', lastResults = [], chartInstance = null, folderChart = null, pendingCard = null;

    function setTheme(t) {
        currentTheme = t; localStorage.setItem('pv_theme', t);
        const color = t === 'gengar' ? '#bc42f5' : '#ffcb05';
        document.documentElement.style.setProperty('--theme-color', color);
        document.getElementById('logo').style.color = color;
        document.getElementById('searchBtn').style.backgroundColor = color;
        document.getElementById('bg-container').style.backgroundImage = t === 'gengar' ? "url('https://i.imgur.com/G75Uku3.png')" : "url('https://i.imgur.com/mtSXVDC.png')";
        renderGrid();
    }

    async function syncToSheets(folder, card) {
        if (SCRIPT_URL.includes("ΕΔΩ")) return;
        const payload = { folder, name: card.name, set: card.set.name, qty: card.quantity, paid: card.userPaid, market: card.cardmarket?.prices?.trendPrice || 0, date: new Date().toISOString() };
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
    }

    async function startSearch() {
        let input = document.getElementById('searchInput').value.trim();
        if(!input) return;
        document.getElementById('grid').innerHTML = '<div class="col-span-full text-center py-24 opacity-20 font-black text-3xl animate-pulse italic uppercase">Searching...</div>';
        let query = input.includes(' ') ? input.split(' ').map(p => isNaN(p) ? `name:"*${p}*"` : `number:${p}`).join(' AND ') : `name:"*${input}*" OR number:"${input}" OR set.id:"${input.toLowerCase()}"`;
        try {
            const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(query)}&orderBy=set.releaseDate,number&pageSize=250`);
            const data = await res.json();
            lastResults = data.data || [];
            document.getElementById('bulkAddBtn').classList.toggle('hidden', lastResults.length === 0);
            renderGrid();
        } catch(e) { console.error(e); }
    }

    function renderSidebar() {
        const sidebar = document.getElementById('collectionSidebar');
        if (currentMode === 'db') { sidebar.classList.add('hidden'); return; }
        sidebar.classList.remove('hidden');
        const list = document.getElementById('folderList'); list.innerHTML = '';
        folderOrder.forEach((f, idx) => {
            const div = document.createElement('div');
            div.className = `folder-btn p-4 rounded-xl flex items-center justify-between cursor-pointer group ${currentFolder === f ? 'active' : 'bg-white/5'}`;
            div.draggable = true;
            div.onclick = () => { currentFolder = f; renderGrid(); };
            div.ondblclick = () => openFolderModal(f);
            div.ondragstart = (e) => e.dataTransfer.setData('fIdx', idx);
            div.ondragover = (e) => { e.preventDefault(); div.classList.add('drag-over'); };
            div.ondragleave = () => div.classList.remove('drag-over');
            div.ondrop = (e) => {
                e.preventDefault(); div.classList.remove('drag-over');
                const fromIdx = e.dataTransfer.getData('fIdx');
                if (fromIdx !== "") { const moved = folderOrder.splice(fromIdx, 1)[0]; folderOrder.splice(idx, 0, moved); saveOrder(); }
                const cardIdx = e.dataTransfer.getData('idx');
                if (cardIdx !== "") { 
                    const card = vaults[currentFolder].splice(cardIdx, 1)[0];
                    const exist = vaults[f].findIndex(c => c.id === card.id);
                    if(exist > -1) vaults[f][exist].quantity += card.quantity; else vaults[f].unshift(card);
                    save();
                }
            };
            div.innerHTML = `<div><p class="text-[11px] font-black uppercase truncate max-w-[150px]">${f}</p><p class="text-[9px] opacity-40">${vaults[f].length} Cards</p></div>
            ${f !== 'Main Collection' ? `<span onclick="event.stopPropagation(); deleteFolder('${f}')" class="opacity-20 hover:opacity-100">✕</span>` : ''}`;
            list.appendChild(div);
        });
    }

    function renderGrid() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        updateStats(); renderSidebar();
        let items = currentMode === 'db' ? lastResults : vaults[currentFolder];
        const sort = document.getElementById('sortSelect').value;
        if(sort === 'price_desc') items.sort((a,b) => (b.cardmarket?.prices?.trendPrice||0) - (a.cardmarket?.prices?.trendPrice||0));
        else if(sort === 'price_asc') items.sort((a,b) => (a.cardmarket?.prices?.trendPrice||0) - (b.cardmarket?.prices?.trendPrice||0));
        
        items.forEach((c, idx) => {
            const div = document.createElement('div');
            div.className = 'card-box p-4 flex flex-col group';
            div.draggable = currentMode === 'col';
            div.onclick = () => openModal(c, idx);
            div.ondragstart = (e) => { if(currentMode==='col') e.dataTransfer.setData('idx', idx); };
            div.innerHTML = `${(c.quantity > 1) ? `<div class="qty-badge">x${c.quantity}</div>` : ''}
                <div class="aspect-[3/4] mb-4 bg-black/40 rounded-xl overflow-hidden"><img src="${c.images.small}" class="w-full h-full object-contain group-hover:scale-110 transition-500"></div>
                <p class="text-[9px] font-black uppercase truncate mb-1 opacity-80">${c.name}</p>
                <div class="flex justify-between items-center text-[10px] font-black text-blue-400"><span>${c.set.ptcgoCode || 'PROMO'}</span><span>€${(c.cardmarket?.prices?.trendPrice || 0).toFixed(2)}</span></div>`;
            grid.appendChild(div);
        });
    }

    function updateStats() {
        let tm = 0, tp = 0;
        Object.values(vaults).forEach(f => f.forEach(c => { tm += (c.cardmarket?.prices?.trendPrice || 0) * (c.quantity || 1); tp += (c.userPaid || 0) * (c.quantity || 1); }));
        document.getElementById('totalVal').innerText = `€${tm.toFixed(2)}`;
        document.getElementById('totalPaid').innerText = `€${tp.toFixed(2)}`;
        const n = tm - tp; const pEl = document.getElementById('netProfit');
        pEl.innerText = `€${n.toFixed(2)}`; pEl.className = `text-2xl font-black ${n >= 0 ? 'text-green-400' : 'text-red-500'}`;
        drawMainChart(tm, tp);
    }

    function drawMainChart(v, c) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, { type: 'line', data: { labels: ['','','','Now'], datasets: [{ data: [c, c*1.02, v*0.98, v], borderColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-color'), borderWidth: 2, fill: true, backgroundColor: 'rgba(188, 66, 245, 0.05)', tension: 0.4, pointRadius: 0 }] }, options: { plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } }, responsive: true, maintainAspectRatio: false } });
    }

    function openModal(card, idx) {
        const price = card.cardmarket?.prices?.trendPrice || 0;
        const paid = card.userPaid || price;
        const isCol = currentMode === 'col';
        document.getElementById('modalContent').innerHTML = `
            <div class="flex gap-6 mb-6"><img src="${card.images.small}" class="w-32 rounded-lg">
            <div class="flex-1"><h3 class="text-lg font-black uppercase">${card.name}</h3><p class="text-[10px] opacity-40 mb-4">${card.set.name}</p>
            <div class="h-16 w-full"><canvas id="miniCardChart"></canvas></div></div></div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div><label class="text-[8px] uppercase font-black opacity-30">Quantity</label><input type="number" id="mQty" value="${card.quantity || 1}" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl font-black text-center outline-none"></div>
                <div><label class="text-[8px] uppercase font-black opacity-30">Paid (€)</label><input type="number" id="mPaid" value="${paid.toFixed(2)}" step="0.01" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl font-black text-center outline-none"></div>
            </div>
            <button onclick="${isCol ? `updateCard(${idx})` : `addCard()`}" class="w-full py-4 rounded-xl font-black uppercase text-xs" style="background:var(--theme-color)">${isCol ? 'Update Vault' : 'Add to Vault'}</button>
            ${isCol ? `<button onclick="deleteCard(${idx})" class="w-full mt-2 text-red-500 text-[10px] font-black uppercase opacity-40 hover:opacity-100">Remove</button>` : ''}`;
        pendingCard = card; document.getElementById('cardModal').classList.remove('hidden');
        setTimeout(() => {
            const ctx = document.getElementById('miniCardChart').getContext('2d');
            new Chart(ctx, { type: 'line', data: { labels: ['Paid', 'Now'], datasets: [{ data: [paid, price], borderColor: price>=paid?'#4ade80':'#f87171', borderWidth: 2, pointRadius: 3 }] }, options: { plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } }, responsive: true, maintainAspectRatio: false } });
        }, 100);
    }

    function openFolderModal(f) {
        const cards = vaults[f]; let val = 0, paid = 0;
        cards.forEach(c => { val += (c.cardmarket?.prices?.trendPrice || 0) * (c.quantity || 1); paid += (c.userPaid || 0) * (c.quantity || 1); });
        const top = [...cards].sort((a,b) => (b.cardmarket?.prices?.trendPrice||0) - (a.cardmarket?.prices?.trendPrice||0)).slice(0, 3);
        document.getElementById('folderModalContent').innerHTML = `
            <div class="mb-6"><input type="text" id="renameInput" value="${f}" class="text-3xl font-black bg-transparent border-b border-white/10 outline-none w-full uppercase"></div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white/5 p-4 rounded-xl text-center"><p class="text-[9px] opacity-40 uppercase font-black">Value</p><p class="text-xl font-black text-blue-400">€${val.toFixed(2)}</p></div>
                <div class="bg-white/5 p-4 rounded-xl text-center"><p class="text-[9px] opacity-40 uppercase font-black">P/L</p><p class="text-xl font-black ${val>=paid?'text-green-400':'text-red-500'}">€${(val-paid).toFixed(2)}</p></div>
            </div>
            <div class="flex gap-2 mb-6">${top.map(c => `<img src="${c.images.small}" class="h-20 rounded-md border border-white/10">`).join('')}</div>
            <button onclick="confirmRename('${f}')" class="w-full py-4 rounded-xl font-black uppercase text-xs bg-white/10">Save Name</button>`;
        document.getElementById('folderModal').classList.remove('hidden');
    }

    function addCard() {
        let card = JSON.parse(JSON.stringify(pendingCard));
        card.quantity = parseInt(document.getElementById('mQty').value) || 1;
        card.userPaid = parseFloat(document.getElementById('mPaid').value) || 0;
        const existIdx = vaults[currentFolder].findIndex(c => c.id === card.id);
        if (existIdx > -1) { 
            const oldQ = vaults[currentFolder][existIdx].quantity;
            const oldP = vaults[currentFolder][existIdx].userPaid;
            vaults[currentFolder][existIdx].quantity += card.quantity;
            vaults[currentFolder][existIdx].userPaid = ((oldP * oldQ) + (card.userPaid * card.quantity)) / (oldQ + card.quantity);
        } else { vaults[currentFolder].unshift(card); }
        syncToSheets(currentFolder, card); save();
    }

    function updateCard(idx) {
        vaults[currentFolder][idx].quantity = parseInt(document.getElementById('mQty').value) || 1;
        vaults[currentFolder][idx].userPaid = parseFloat(document.getElementById('mPaid').value) || 0;
        syncToSheets(currentFolder, vaults[currentFolder][idx]); save();
    }

    function deleteCard(idx) { if(confirm("Remove?")) { vaults[currentFolder].splice(idx, 1); save(); } }
    function confirmRename(old) { const n = document.getElementById('renameInput').value.trim(); if(n && n!==old) { vaults[n] = vaults[old]; delete vaults[old]; folderOrder[folderOrder.indexOf(old)] = n; currentFolder = n; saveOrder(); save(); closeFolderModal(); } }
    function save() { localStorage.setItem('pv_v12_data', JSON.stringify(vaults)); closeModal(); renderGrid(); }
    function saveOrder() { localStorage.setItem('pv_folder_order', JSON.stringify(folderOrder)); }
    function switchMode(m) { currentMode = m; document.getElementById('databaseUI').style.display = m==='db'?'block':'none'; document.getElementById('navDb').classList.toggle('active', m==='db'); document.getElementById('navCol').classList.toggle('active', m==='col'); renderGrid(); }
    function addFolder() { const n = prompt("Name:"); if(n && !vaults[n]) { vaults[n] = []; folderOrder.push(n); currentFolder = n; saveOrder(); save(); } }
    function deleteFolder(f) { if(confirm("Delete vault?")) { delete vaults[f]; folderOrder = folderOrder.filter(x => x!==f); currentFolder = folderOrder[0]; saveOrder(); save(); } }
    function closeModal() { document.getElementById('cardModal').classList.add('hidden'); }
    function closeFolderModal() { document.getElementById('folderModal').classList.add('hidden'); }
    async function syncAllToSheets() { for(let f in vaults) { for(let c of vaults[f]) { await syncToSheets(f, c); } } alert("Sync complete!"); }
    window.onload = () => { setTheme(currentTheme); switchMode('db'); };
</script>
</body>
</html>
