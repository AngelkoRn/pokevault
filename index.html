<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeVault v15.9 - Sheets Integrated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }
        #bg-container { position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; opacity: 0.8; filter: brightness(0.7); transition: 0.8s; background-image: url('https://i.imgur.com/G75Uku3.png'); }
        .glass { background: rgba(15, 15, 20, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; backdrop-filter: blur(25px); }
        .card-box { background: rgba(30, 30, 35, 0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; }
        .card-box:hover { border-color: #bc42f5; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(188, 66, 245, 0.2); }
        .qty-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.9); border: 1px solid #bc42f5; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; z-index: 10; }
        .nav-btn.active { border-bottom: 4px solid currentColor; opacity: 1; }
        .sidebar { width: 280px; transition: 0.3s; }
        .folder-btn { width: 100%; text-align: left; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .folder-btn.active { border-color: #bc42f5; background: rgba(188, 66, 245, 0.15); color: #bc42f5; }
        .folder-btn.drag-over { border-color: #bc42f5; transform: scale(1.02); background: rgba(188, 66, 245, 0.3); }
        .delete-folder-btn { opacity: 0.2; transition: 0.2s; }
        .delete-folder-btn:hover { opacity: 1; color: #ef4444; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="bg-container"></div>
    
    <div class="max-w-[1650px] mx-auto flex flex-col md:flex-row gap-8">
        
        <aside id="collectionSidebar" class="sidebar hidden">
            <div class="glass p-6 sticky top-8">
                <h2 class="text-[10px] font-black uppercase tracking-[0.2em] mb-6 opacity-40">My Vaults</h2>
                <div id="folderList" class="flex flex-col gap-3 mb-6 max-h-[60vh] overflow-y-auto no-scrollbar"></div>
                <button onclick="addFolder()" class="w-full py-4 rounded-xl border border-dashed border-white/10 text-[10px] font-black uppercase hover:bg-white/5 transition-all">+ Create New Vault</button>
                <button id="syncBtn" onclick="syncAllToSheets()" class="w-full mt-4 py-3 bg-green-600/10 text-green-400 border border-green-500/20 rounded-xl text-[9px] font-black uppercase hover:bg-green-600 hover:text-white transition-all">🔄 Sync All to Sheets</button>
            </div>
        </aside>

        <main class="flex-1 min-w-0">
            <nav class="flex gap-10 mb-8 px-4">
                <button onclick="switchMode('db')" id="navDb" class="nav-btn pb-2 text-sm font-black uppercase opacity-40 active">🔍 Search</button>
                <button onclick="switchMode('col')" id="navCol" class="nav-btn pb-2 text-sm font-black uppercase opacity-40">🗄️ Collection</button>
            </nav>

            <header class="glass p-8 mb-10 border-white/10 relative">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h1 id="logo" class="text-4xl font-black italic tracking-tighter uppercase text-[#bc42f5]">PokeVault</h1>
                        <div class="flex gap-10 mt-6">
                            <div class="flex flex-col"><span class="text-[9px] opacity-40 font-black uppercase tracking-widest mb-1">Global Investment</span><span id="totalPaid" class="text-white font-bold text-2xl">€0.00</span></div>
                            <div class="flex flex-col"><span class="text-[9px] opacity-40 font-black uppercase tracking-widest mb-1 text-blue-400">Global Value</span><span id="totalVal" class="text-blue-400 font-bold text-2xl">€0.00</span></div>
                            <div class="flex flex-col"><span class="text-[9px] opacity-40 font-black uppercase tracking-widest mb-1 text-green-400">Total P/L</span><span id="netProfit" class="font-black text-2xl">€0.00</span></div>
                        </div>
                    </div>
                    <div class="flex gap-3 bg-black/40 p-2 rounded-full border border-white/5">
                        <button onclick="setTheme('gengar')" class="w-8 h-8 rounded-full bg-purple-700"></button>
                        <button onclick="setTheme('pikachu')" class="w-8 h-8 rounded-full bg-yellow-500"></button>
                    </div>
                </div>
                <div class="h-[100px] w-full"><canvas id="mainChart"></canvas></div>
            </header>

            <div id="databaseUI">
                <div class="glass p-5 mb-10 flex flex-wrap gap-4 items-center">
                    <input type="text" id="searchInput" onkeydown="if(event.key==='Enter') startSearch()" placeholder="Try: DRI, SSP, Pikachu..." class="flex-1 p-5 rounded-2xl font-bold bg-black/60 border border-white/10 outline-none focus:border-[#bc42f5] text-lg">
                    <select id="sortSelect" onchange="renderGrid()" class="bg-black/60 border border-white/10 p-5 rounded-2xl text-xs font-black uppercase outline-none">
                        <option value="number">Card Number</option>
                        <option value="price_desc">Price High</option>
                        <option value="price_asc">Price Low</option>
                        <option value="newest">Newest</option>
                    </select>
                    <button onclick="startSearch()" id="searchBtn" class="bg-[#bc42f5] px-12 py-5 rounded-2xl font-black uppercase text-sm hover:brightness-110">Search API</button>
                    <button id="bulkAddBtn" onclick="bulkAddSet()" class="hidden bg-blue-600 px-8 py-5 rounded-2xl font-black uppercase text-xs hover:bg-blue-500">Add All</button>
                </div>
            </div>

            <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 mb-32 transition-all"></div>
        </main>
    </div>

    <div id="cardModal" class="hidden fixed inset-0 bg-black/98 z-[500] flex items-center justify-center p-4 backdrop-blur-2xl">
        <div class="glass max-w-lg w-full p-10 relative border-white/20"><button onclick="closeModal()" class="absolute top-6 right-6 text-white/20 text-2xl font-black">✕</button><div id="modalContent"></div></div>
    </div>

    <div id="folderModal" class="hidden fixed inset-0 bg-black/98 z-[500] flex items-center justify-center p-4 backdrop-blur-2xl">
        <div class="glass max-w-2xl w-full p-10 relative border-white/20">
            <button onclick="closeFolderModal()" class="absolute top-6 right-6 text-white/20 text-2xl font-black">✕</button>
            <div id="folderModalContent"></div>
        </div>
    </div>

    <script>
        // --- GOOGLE SHEETS CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEXgzNPbTOtwKQtXznhlq-isS7lEt24sB-xatz3Z8nJyAUbxgMc9tf9-P4t9rL5St2/exec"; // Βάλε το URL από το Google Apps Script σου

        let vaults = JSON.parse(localStorage.getItem('pv_v12_data')) || { 'Main Collection': [] };
        let folderOrder = JSON.parse(localStorage.getItem('pv_folder_order')) || Object.keys(vaults);
        let currentTheme = localStorage.getItem('pv_theme') || 'gengar';
        let currentFolder = folderOrder[0], currentMode = 'db', lastResults = [], chartInstance = null, folderChart = null, pendingCard = null;

        // --- THEME & SEARCH (FROM v15.1) ---
        function setTheme(t) {
            currentTheme = t; localStorage.setItem('pv_theme', t);
            const color = t === 'gengar' ? '#bc42f5' : '#ffcb05';
            document.getElementById('logo').style.color = color;
            document.getElementById('searchBtn').style.backgroundColor = color;
            document.getElementById('bg-container').style.backgroundImage = t === 'gengar' ? "url('https://i.imgur.com/G75Uku3.png')" : "url('https://i.imgur.com/mtSXVDC.png')";
            renderGrid();
        }

        async function startSearch() {
            let input = document.getElementById('searchInput').value.trim();
            if(!input) return;
            let grid = document.getElementById('grid');
            grid.innerHTML = '<div class="col-span-full text-center py-24 opacity-20 font-black text-3xl animate-pulse italic uppercase tracking-tighter">Searching Database...</div>';
            let parts = input.split(' ');
            let queryParts = [];
            parts.forEach(part => {
                if (!isNaN(part)) queryParts.push(`(number:"${part.replace(/^0+/, '')}" OR number:"${part}")`);
                else if (part.length === 3) queryParts.push(`(set.id:"${part.toLowerCase()}*" OR set.ptcgoCode:"${part.toUpperCase()}*" OR set.name:"*${part}*")`);
                else if (part.length <= 4) queryParts.push(`(set.id:"${part.toLowerCase()}*" OR set.ptcgoCode:"${part.toUpperCase()}*" OR set.name:"*${part}*" OR name:"*${part}*")`);
                else queryParts.push(`name:"*${part}*"`);
            });
            try {
                const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(queryParts.join(' AND '))}&orderBy=set.releaseDate,number&pageSize=1000`);
                const data = await res.json();
                lastResults = data.data || [];
                document.getElementById('bulkAddBtn').classList.toggle('hidden', lastResults.length === 0);
                renderGrid();
            } catch(e) { alert("API Error"); }
        }

        // --- LIVE SYNC FUNCTION ---
        async function syncToSheets(folder, card) {
            if (!SCRIPT_URL || SCRIPT_URL.includes("ΕΔΩ")) return;
            const payload = {
                folder: folder,
                name: card.name,
                set: card.set.name,
                number: card.number,
                qty: card.quantity,
                paid: card.userPaid,
                market: card.cardmarket?.prices?.trendPrice || 0,
                date: new Date().toISOString()
            };
            try {
                fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            } catch(e) { console.error("Sync error", e); }
        }

        async function syncAllToSheets() {
            const btn = document.getElementById('syncBtn');
            btn.innerText = "Syncing...";
            for (let f in vaults) {
                for (let c of vaults[f]) {
                    await syncToSheets(f, c);
                }
            }
            btn.innerText = "✅ Synced!";
            setTimeout(() => btn.innerText = "🔄 Sync All to Sheets", 3000);
        }

        // --- RENDER & LOGIC (FROM v15.1) ---
        function renderSidebar() {
            const list = document.getElementById('folderList');
            const sidebar = document.getElementById('collectionSidebar');
            if (currentMode === 'col') sidebar.classList.remove('hidden');
            else { sidebar.classList.add('hidden'); return; }

            list.innerHTML = '';
            folderOrder.forEach((f, idx) => {
                const div = document.createElement('div');
                div.className = `folder-btn p-4 rounded-xl flex items-center justify-between cursor-pointer group ${currentFolder === f ? 'active' : 'bg-white/5'}`;
                div.draggable = true;
                div.onclick = () => { currentFolder = f; renderGrid(); };
                div.ondblclick = () => openFolderModal(f);
                div.ondragstart = (e) => e.dataTransfer.setData('fIdx', idx);
                div.ondragover = (e) => { e.preventDefault(); div.classList.add('drag-over'); };
                div.ondragleave = () => div.classList.remove('drag-over');
                div.ondrop = (e) => {
                    e.preventDefault(); div.classList.remove('drag-over');
                    const fromIdx = e.dataTransfer.getData('fIdx');
                    if (fromIdx !== "") {
                        const movedFolder = folderOrder.splice(fromIdx, 1)[0];
                        folderOrder.splice(idx, 0, movedFolder);
                        saveOrder();
                    }
                    const cardIdx = e.dataTransfer.getData('idx');
                    if(cardIdx !== "") {
                        e.stopPropagation();
                        const card = vaults[currentFolder].splice(cardIdx, 1)[0];
                        const exist = vaults[f].findIndex(c => c.id === card.id);
                        if(exist > -1) vaults[f][exist].quantity += card.quantity;
                        else vaults[f].unshift(card);
                        save();
                    }
                };
                div.innerHTML = `<div class="flex flex-col"><span class="text-[11px] font-black uppercase truncate max-w-[150px]">${f}</span><span class="text-[9px] opacity-40 font-bold">${vaults[f].length} Cards</span></div>
                ${f !== 'Main Collection' ? `<span onclick="event.stopPropagation(); deleteFolder('${f}')" class="delete-folder-btn text-xs">✕</span>` : ''}`;
                list.appendChild(div);
            });
        }

        function switchMode(m) {
            currentMode = m;
            document.getElementById('databaseUI').style.display = m === 'db' ? 'block' : 'none';
            document.getElementById('navDb').classList.toggle('active', m === 'db');
            document.getElementById('navCol').classList.toggle('active', m === 'col');
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            updateStats(); renderSidebar();
            let items = currentMode === 'db' ? [...lastResults] : [...vaults[currentFolder]];
            const sort = document.getElementById('sortSelect').value;
            if(sort === 'number') items.sort((a,b) => (a.set.id === b.set.id) ? (parseInt(a.number.replace(/\D/g, '')) || 0) - (parseInt(b.number.replace(/\D/g, '')) || 0) : 0);
            else if(sort === 'price_desc') items.sort((a,b) => (b.cardmarket?.prices?.trendPrice||0) - (a.cardmarket?.prices?.trendPrice||0));
            else if(sort === 'price_asc') items.sort((a,b) => (a.cardmarket?.prices?.trendPrice||0) - (b.cardmarket?.prices?.trendPrice||0));
            else if(sort === 'newest') items.sort((a,b) => new Date(b.set.releaseDate) - new Date(a.set.releaseDate));

            items.forEach((c, idx) => {
                const div = document.createElement('div');
                div.className = 'card-box p-4 flex flex-col group';
                div.draggable = currentMode === 'col';
                div.onclick = () => openModal(c, idx);
                div.ondragstart = (e) => { if(currentMode==='col') { e.dataTransfer.setData('idx', idx); } };
                div.innerHTML = `${(c.quantity > 1) ? `<div class="qty-badge">x${c.quantity}</div>` : ''}
                    <div class="aspect-[3/4] overflow-hidden rounded-xl mb-4 bg-black/40"><img src="${c.images.small}" class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500"></div>
                    <p class="text-[9px] font-black uppercase truncate opacity-80 mb-1">${c.name}</p>
                    <div class="flex justify-between items-center text-[10px] font-black text-blue-400">
                        <span class="opacity-30 uppercase">${c.set.ptcgoCode || c.set.id.substring(0,4)}</span><span>€${(c.cardmarket?.prices?.trendPrice || 0).toFixed(2)}</span>
                    </div>`;
                grid.appendChild(div);
            });
        }

        function updateStats() {
            let tm = 0, tp = 0;
            Object.values(vaults).forEach(f => f.forEach(c => { tm += (c.cardmarket?.prices?.trendPrice || 0) * (c.quantity || 1); tp += (c.userPaid || 0) * (c.quantity || 1); }));
            document.getElementById('totalVal').innerText = `€${tm.toFixed(2)}`;
            document.getElementById('totalPaid').innerText = `€${tp.toFixed(2)}`;
            const n = tm - tp; const pEl = document.getElementById('netProfit');
            pEl.innerText = `€${n.toFixed(2)}`; pEl.className = `text-2xl font-black ${n >= 0 ? 'text-green-400' : 'text-red-500'}`;
            drawChart(tm, tp);
        }

        function drawChart(val, cost) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'line', data: { labels: ['', '', '', '', 'Now'], datasets: [{ data: [cost * 0.95, cost, cost * 1.02, val * 0.98, val], borderColor: currentTheme === 'gengar' ? '#bc42f5' : '#ffcb05', borderWidth: 2, tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(188, 66, 245, 0.05)' }] }, options: { plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } }, responsive: true, maintainAspectRatio: false } });
        }

        function openModal(card, idx) {
            const price = card.cardmarket?.prices?.trendPrice || 0;
            const isCol = currentMode === 'col';
            document.getElementById('modalContent').innerHTML = `
                <div class="flex gap-8 mb-8"><img src="${card.images.small}" class="w-40 rounded-2xl"><div class="flex-1"><h3 class="text-xl font-black uppercase mb-2">${card.name}</h3><p class="text-[10px] text-[#bc42f5] font-black uppercase mb-6">${card.set.name}</p><div class="bg-white/5 p-4 rounded-2xl border border-white/5"><span class="text-[8px] opacity-40 uppercase font-black">Market Trend</span><span class="text-xl font-black block">€${price.toFixed(2)}</span></div></div></div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="flex flex-col"><span class="text-[8px] uppercase font-black opacity-30 mb-2">Quantity</span><input type="number" id="mQty" value="${card.quantity || 1}" class="bg-black/40 border border-white/10 p-4 rounded-xl font-black text-center outline-none"></div>
                    <div class="flex flex-col"><span class="text-[8px] uppercase font-black opacity-30 mb-2">Paid per Unit</span><input type="number" id="mPaid" value="${(card.userPaid || price).toFixed(2)}" step="0.01" class="bg-black/40 border border-white/10 p-4 rounded-xl font-black text-center outline-none"></div>
                </div>
                <div class="flex gap-4">${isCol ? `<button onclick="deleteCard(${idx})" class="flex-1 bg-red-600/10 text-red-500 border border-red-500/30 py-4 rounded-xl font-black uppercase text-xs">Remove</button>` : ''}<button onclick="${isCol ? `updateCard(${idx})` : `addCard()`}" class="flex-[2] bg-[#bc42f5] py-4 rounded-xl font-black uppercase hover:brightness-110 text-xs">${isCol ? 'Update Vault' : 'Add to Vault'}</button></div>`;
            pendingCard = card; document.getElementById('cardModal').classList.remove('hidden');
        }

        function addCard() {
            let card = JSON.parse(JSON.stringify(pendingCard));
            const aQ = parseInt(document.getElementById('mQty').value) || 1, aP = parseFloat(document.getElementById('mPaid').value) || 0;
            const exIdx = vaults[currentFolder].findIndex(c => c.id === card.id);
            if (exIdx > -1) {
                const oQ = vaults[currentFolder][exIdx].quantity || 1, oP = vaults[currentFolder][exIdx].userPaid || 0;
                vaults[currentFolder][exIdx].quantity = oQ + aQ;
                vaults[currentFolder][exIdx].userPaid = ((oP * oQ) + (aP * aQ)) / (oQ + aQ);
                syncToSheets(currentFolder, vaults[currentFolder][exIdx]);
            } else { 
                card.quantity = aQ; card.userPaid = aP; 
                vaults[currentFolder].unshift(card); 
                syncToSheets(currentFolder, card);
            }
            save();
        }

        function updateCard(idx) {
            const nQ = parseInt(document.getElementById('mQty').value) || 0;
            if(nQ <= 0) deleteCard(idx);
            else { 
                vaults[currentFolder][idx].quantity = nQ; 
                vaults[currentFolder][idx].userPaid = parseFloat(document.getElementById('mPaid').value) || 0; 
                syncToSheets(currentFolder, vaults[currentFolder][idx]);
                save(); 
            }
        }

        // Folder Modal & Extra functions from v15.1
        function openFolderModal(f) {
            const fCards = vaults[f]; let fVal = 0, fPaid = 0;
            fCards.forEach(c => { fVal += (c.cardmarket?.prices?.trendPrice || 0) * (c.quantity || 1); fPaid += (c.userPaid || 0) * (c.quantity || 1); });
            const topCards = [...fCards].sort((a,b) => (b.cardmarket?.prices?.trendPrice || 0) - (a.cardmarket?.prices?.trendPrice || 0)).slice(0, 3);
            document.getElementById('folderModalContent').innerHTML = `
                <div class="flex justify-between items-end mb-8">
                    <div><h2 class="text-[10px] font-black uppercase tracking-widest opacity-40 mb-2">Vault Report</h2><input type="text" id="renameInput" value="${f}" class="text-3xl font-black bg-transparent border-b border-white/10 outline-none focus:border-[#bc42f5] uppercase w-full"></div>
                    <button onclick="confirmRename('${f}')" class="bg-[#bc42f5] px-6 py-3 rounded-xl text-[10px] font-black uppercase">Save Name</button>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white/5 p-6 rounded-2xl text-center"><span class="text-[9px] opacity-40 uppercase font-black block mb-1">Value</span><span class="text-2xl font-black text-blue-400">€${fVal.toFixed(2)}</span></div>
                    <div class="bg-white/5 p-6 rounded-2xl text-center"><span class="text-[9px] opacity-40 uppercase font-black block mb-1">Profit</span><span class="text-2xl font-black ${fVal-fPaid >= 0 ? 'text-green-400' : 'text-red-500'}">€${(fVal-fPaid).toFixed(2)}</span></div>
                </div>
                <div class="flex gap-4">${topCards.map(c => `<div class="flex-1 bg-black/40 p-3 rounded-xl flex flex-col items-center"><img src="${c.images.small}" class="h-20 mb-2"><span class="text-[8px] font-black uppercase truncate text-center">${c.name}</span></div>`).join('')}</div>`;
            document.getElementById('folderModal').classList.remove('hidden');
        }

        function saveOrder() { localStorage.setItem('pv_folder_order', JSON.stringify(folderOrder)); renderSidebar(); }
        function save() { localStorage.setItem('pv_v12_data', JSON.stringify(vaults)); closeModal(); renderGrid(); }
        function addFolder() { const n = prompt("Vault Name:"); if(n && !vaults[n]) { vaults[n] = []; folderOrder.push(n); currentFolder = n; saveOrder(); save(); } }
        function deleteFolder(f) { if(confirm(`Delete ${f}?`)) { delete vaults[f]; folderOrder = folderOrder.filter(x => x !== f); if(currentFolder === f) currentFolder = folderOrder[0]; saveOrder(); save(); } }
        function confirmRename(old) { const n = document.getElementById('renameInput').value.trim(); if(n && n !== old) { vaults[n] = vaults[old]; delete vaults[old]; folderOrder[folderOrder.indexOf(old)] = n; currentFolder = n; saveOrder(); save(); closeFolderModal(); } }
        function closeModal() { document.getElementById('cardModal').classList.add('hidden'); }
        function closeFolderModal() { document.getElementById('folderModal').classList.add('hidden'); }
        function deleteCard(idx) { if(confirm("Remove?")) { vaults[currentFolder].splice(idx, 1); save(); } }

        window.onload = () => { setTheme(currentTheme); renderGrid(); };
    </script>
</body>
</html>
